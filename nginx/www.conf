server {
    client_max_body_size 15M;
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Security: prevent PHP execution on uploads
        fastcgi_param  PATH_INFO $fastcgi_path_info;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
        expires max;
        log_not_found off;
    }

    # Block access to sensitive WordPress files
    location ~* /(?:wp-config\.php|readme\.html|license\.txt|xmlrpc\.php) {
        deny all;
    }

    location ~ /\.ht {
        deny all;
    }

    # Prevent PHP execution inside uploads
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }
}